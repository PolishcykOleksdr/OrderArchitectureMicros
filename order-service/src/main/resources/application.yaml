spring:
  application:
    name: order-service
  datasource:
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: rootroot
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/orders
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: 8080